server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # 前端静态资源 + SPA history 路由回退
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 把 /api 之外的后端调用反代到 cs-agent（容器内服务名）
    # 前端用 VITE_API_BASE 直连 cs-agent:8000；compose 网络内可达。
    # 如需同源部署可在此加 proxy_pass，本版前端走 CORS 直连，保持简单。
}
